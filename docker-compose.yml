version: '3.8'

# Default deployment recipe — JSON-file persistence, no Redis required.
# Override any value via a sibling `.env` file (see .env.example).

services:
  qwen2api:
    build: .
    container_name: qwen2api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # ── Required ─────────────────────────────────────────────
      - SERVICE_PORT=3000
      - API_KEY=${API_KEY}
      - ACCOUNTS=${ACCOUNTS}

      # ── Persistence (JSON file) ──────────────────────────────
      # Hard-coded to `file` for Docker — accounts / proxy bindings /
      # proxy statuses / API keys / usage stats all write to
      # /app/data/data.json, persisted via the ./data volume below.
      #
      # Deliberately NOT interpolated from the host env: a stray
      # `DATA_SAVE_MODE=none` in .env (e.g. copied from .env.example)
      # would silently disable persistence and the ./data dir would
      # stay empty. If you really want redis or none, edit this line.
      - DATA_SAVE_MODE=file

      # ── Logging ──────────────────────────────────────────────
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_FILE_LOG=${ENABLE_FILE_LOG:-false}

      # ── Smart proxy pool (PR feat/proxy-test-and-mode) ──────
      # PROXIES = comma-separated list, schemes: socks5/socks4/http/https
      # PROXY_URL = legacy single-proxy form, merged into the pool
      - PROXIES=${PROXIES:-}
      - PROXY_URL=${PROXY_URL:-}
      - PROXY_MAX_RETRIES=${PROXY_MAX_RETRIES:-3}

      # ── Account control ──────────────────────────────────────
      # Comma-separated emails kept loaded but skipped by the rotator.
      # Toggleable at runtime from the admin panel.
      - DISABLED_ACCOUNTS=${DISABLED_ACCOUNTS:-}

      # ── Optional behavior flags ──────────────────────────────
      - LISTEN_ADDRESS=${LISTEN_ADDRESS:-}
      - OUTPUT_THINK=${OUTPUT_THINK:-false}
      - SEARCH_INFO_MODE=${SEARCH_INFO_MODE:-text}
      - SIMPLE_MODEL_MAP=${SIMPLE_MODEL_MAP:-false}
      - QWEN_CHAT_PROXY_URL=${QWEN_CHAT_PROXY_URL:-https://chat.qwen.ai}
    volumes:
      # data.json (accounts + proxy state + api keys + usage)
      - ./data:/app/data
      # rotated log files when ENABLE_FILE_LOG=true
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
